name: acrillic
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  flutter_launcher_icons: ^0.14.3
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  http: ^1.3.0
  logger: ^2.5.0
  provider: ^6.1.2
  rename_app: ^1.6.2
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - prod.env

fonts:
  family: Poppins
  fonts:
    - asset: assets/fonts/Poppins-Regular.ttf